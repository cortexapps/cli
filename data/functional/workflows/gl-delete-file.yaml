isDraft: false
isRunnableViaApi: true
filter:
  type: GLOBAL
variables:
- slug: project
  type: STRING
- slug: path
  type: STRING
- slug: branch
  type: STRING
- slug: message
  type: STRING
actions:
- name: Delete File
  slug: delete-file
  schema:
    type: ADVANCED_HTTP_REQUEST
    actionIdentifier: gitlab.deleteFile
    integrationAlias: __GITLAB_INTEGRATION_ALIAS__
    inputs:
      project: "{{variables.project}}"
      path: "{{variables.path}}"
      branch: "{{variables.branch}}"
      message: "{{variables.message}}"
  outgoingActions: []
  isRootAction: true

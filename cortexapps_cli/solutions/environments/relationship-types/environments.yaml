tag: environments
name: Environments
description: >
  Hierarchical relationship powering the environment -> release -> service-version
  catalog view in a single catalog.
  Sources: environment, release. Targets: release, service-version.
  Note: flexible source/target allows environment->service-version edges which
  should NOT be created. Multi-hop constraints not yet supported by Cortex.
sourceTypes:
  - environment
  - release
targetTypes:
  - release
  - service-version

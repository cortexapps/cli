tag: create-release
name: Create Release
description: >
  Creates a release entity in Cortex linked to an environment.
  Add your deployment orchestration steps after the entity creation action.
filter:
  type: GLOBAL
isDraft: true
actions:
  - name: Collect Inputs
    slug: collect-inputs
    isRootAction: true
    outgoingActions:
      - create-entity
    schema:
      type: USER_INPUT
      inputs:
        - name: Release Tag
          key: releaseTag
          description: Release identifier (e.g. release-2026-07-01-prod)
          required: true
          type: INPUT_FIELD
        - name: Environment
          key: environmentTag
          description: Target environment entity tag (e.g. gcp-prod-us-east-1)
          required: true
          type: INPUT_FIELD
        - name: Description
          key: releaseDescription
          description: What is in this release
          required: false
          type: INPUT_FIELD
      inputOverrides: []
      jsValidatorScript: null
  - name: Create Release Entity
    slug: create-entity
    isRootAction: false
    outgoingActions: []
    schema:
      type: ADVANCED_HTTP_REQUEST
      actionIdentifier: cortex.createOrUpdateEntity
      integrationAlias: null
      inputs:
        mode: CREATE
        dryRun: false
        body: "openapi: \"3.0.0\"\ninfo:\n  title: \"{{actions.collect-inputs.outputs.releaseTag}}\"\
          \n  x-cortex-tag: \"{{actions.collect-inputs.outputs.releaseTag}}\"\n  x-cortex-type:\
          \ release\n  x-cortex-description: \"{{actions.collect-inputs.outputs.releaseDescription}}\"\
          \n  x-cortex-relationships:\n    - type: environments\n      sources:\n\
          \        - tag: \"{{actions.collect-inputs.outputs.environmentTag}}\"\n"

tag: create-release
name: Create Release
description: >
  Creates a release entity in Cortex linked to the selected service versions.
  Add your deployment orchestration steps after the entity creation action.
filter:
  type: GLOBAL
isDraft: true
runResponseTemplate: |
  Release **{{actions.collect-inputs.outputs.releaseTag}}** created successfully.

  [View entity](/catalog/{{actions.collect-inputs.outputs.releaseTag}})
failedRunResponseTemplate: |
  Failed to create release **{{actions.collect-inputs.outputs.releaseTag}}**. Check the action logs for details.
actions:
  - name: Collect Inputs
    slug: collect-inputs
    isRootAction: true
    outgoingActions:
      - build-destinations
    schema:
      type: USER_INPUT
      inputs:
        - name: Release Tag
          key: releaseTag
          description: Release identifier (e.g. release-2026-07-15)
          required: true
          type: INPUT_FIELD
        - name: Service Versions
          key: serviceVersions
          description: "Comma-separated service version tags (e.g. payments-1.6.1, auth-2.1.0, api-gateway-3.0.1)"
          required: true
          type: INPUT_FIELD
        - name: Description
          key: description
          description: What is in this release
          required: false
          type: INPUT_FIELD
      inputOverrides: []
      jsValidatorScript: null
  - name: Build Destinations YAML
    slug: build-destinations
    isRootAction: false
    outgoingActions:
      - create-entity
    schema:
      type: JAVASCRIPT
      script: |
        const input = actions["collect-inputs"].outputs.serviceVersions;
        const arr = input.split(",").map(s => s.trim()).filter(s => s.length > 0);
        const items = arr.map(tag => `        - tag: "${tag}"`).join("\n");
        return {
          relationshipsYaml: `  x-cortex-relationships:\n    - type: environments\n      destinations:\n${items}`
        };
  - name: Create Release Entity
    slug: create-entity
    isRootAction: false
    outgoingActions: []
    schema:
      type: ADVANCED_HTTP_REQUEST
      actionIdentifier: cortex.createOrUpdateEntity
      integrationAlias: null
      inputs:
        mode: CREATE
        dryRun: false
        body: |
          openapi: "3.0.0"
          info:
            title: "{{actions.collect-inputs.outputs.releaseTag}}"
            x-cortex-tag: "{{actions.collect-inputs.outputs.releaseTag}}"
            x-cortex-type: release
            x-cortex-description: "{{actions.collect-inputs.outputs.description}}"
          {{{actions.build-destinations.outputs.relationshipsYaml}}}

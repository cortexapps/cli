apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kratix-cortex-resources
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/jeff-test-org/ske-test-resources
    targetRevision: HEAD
    path: .
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
